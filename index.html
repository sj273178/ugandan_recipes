<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Discover authentic Ugandan recipes, from Rolex and Matoke to Pilau and Luwombo."
    />
    <title>Taste Uganda | Authentic Ugandan Cuisine</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27%3E%3Ctext y=%27.9em%27 font-size=%2790%27%3E🍽️%3C/text%3E%3C/svg%3E"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <!-- ===================== NAVBAR ===================== -->
    <nav class="navbar" id="navbar">
      <div class="container">
        <div class="navbar-inner">
          <!-- Logo -->
          <a href="index.html" class="navbar-logo">
            <div class="logo-icon">🍽️</div>
            <div class="logo-text">
              Taste
              <span>Uganda</span>
            </div>
          </a>

          <!-- Desktop nav links -->
          <ul class="navbar-nav">
            <li><a href="index.html" class="nav-link active">Home</a></li>
            <li><a href="recipes.html" class="nav-link">Recipes</a></li>
            <li><a href="about.html" class="nav-link">About</a></li>
            <li><a href="contact.html" class="nav-link">Contact</a></li>
          </ul>

          <!-- Right-side actions -->
          <div class="navbar-actions">
            <button class="search-toggle" id="searchToggle" aria-label="Search">
              🔍
            </button>
            <a href="recipes.html" class="btn btn-primary btn-nav">
              Explore Recipes
            </a>
            <button class="hamburger" id="hamburger" aria-label="Menu">
              <span></span>
              <span></span>
              <span></span>
            </button>
          </div>
        </div>
      </div>
    </nav>

    <!-- ===================== MOBILE MENU ===================== -->
    <div class="mobile-menu" id="mobileMenu">
      <ul class="mobile-nav-links">
        <li><a href="index.html" class="mobile-nav-link active">🏠 Home</a></li>
        <li><a href="recipes.html" class="mobile-nav-link">📖 Recipes</a></li>
        <li><a href="about.html" class="mobile-nav-link">🌍 About</a></li>
        <li><a href="contact.html" class="mobile-nav-link">✉️ Contact</a></li>
      </ul>
      <a href="recipes.html" class="btn btn-primary mobile-nav-cta">
        Explore Recipes
      </a>
    </div>

    <!-- ===================== SEARCH OVERLAY ===================== -->
    <div class="search-overlay" id="searchOverlay">
      <div class="search-box">
        <div class="search-input-wrapper">
          <span class="search-icon-inner">🔍</span>
          <input
            type="text"
            class="search-input"
            id="heroSearchInput"
            placeholder="Search Ugandan recipes..."
          />
          <button class="search-close" id="searchClose">✕</button>
        </div>
        <p class="search-hint">
          Try: Rolex, Luwombo, Matoke, Pilau, Chapati...
        </p>
      </div>
    </div>

    <!-- Toast notification -->
    <div class="toast" id="toast">
      <span class="toast-icon"></span>
      <span id="toastMessage"></span>
    </div>

    <script src="js/main.js"></script>
  </body>
</html>
